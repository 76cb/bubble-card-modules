  code: |
    ${(() => {
      const config = this.config.fan_speed_visual_center || {};
      const fanEntity = config.fan_entity || this.config.entity;
      const fan = fanEntity ? hass.states[fanEntity] : null;

      const state = fan?.state || "off";
      const pct = Number(fan?.attributes?.percentage || 0);
      const isOn = state === "on";

      const lowMax = Number(config.low_max ?? 40);
      const mediumMax = Number(config.medium_max ?? 80);

      let speed = "off";
      if (isOn && pct > 0 && pct <= lowMax) speed = "low";
      else if (isOn && pct > lowMax && pct <= mediumMax) speed = "medium";
      else if (isOn && pct > mediumMax) speed = "high";

      const rgbToCss = (rgb) => {
        if (!Array.isArray(rgb)) return "";
        return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
      };

      const themeToCss = (value) => {
        if (!value || value === "none") return "";
        if (value === "state") return "var(--state-icon-active-color)";
        if (value === "transparent") return "transparent";

        const raw = String(value).trim();

        if (
          raw.startsWith("#") ||
          raw.startsWith("rgb") ||
          raw.startsWith("hsl") ||
          raw.startsWith("var(") ||
          raw === "white" ||
          raw === "black" ||
          raw === "transparent"
        ) {
          return raw;
        }

        return `var(--${raw}-color, ${raw})`;
      };

      const templateToCss = (template) => {
        if (!template) return "";
        try {
          return Function("hass", "entity", "state", "pct", "speed", `return ();`)(hass, fan, state, pct, speed) || "";
        } catch (e) {
          try {
            return Function("hass", "entity", "state", "pct", "speed", template)(hass, fan, state, pct, speed) || "";
          } catch (err) {
            return "";
          }
        }
      };

      const color = (base, fallback = "") => {
        const mode = config[`${base}_mode`] || "preset";

        if (mode === "manual") {
          return String(config[`${base}_manual`] || "").trim() || fallback;
        }

        if (mode === "wheel") {
          return rgbToCss(config[`${base}_wheel`]) || fallback;
        }

        if (mode === "template") {
          return String(templateToCss(config[`${base}_template`])).trim() || fallback;
        }

        return themeToCss(config[`${base}_theme`]) || fallback;
      };

      const setVar = (name, value) => {
        if (value) card.style.setProperty(name, value);
        else card.style.removeProperty(name);
      };

      const findMainIcon = () => {
        return card.querySelector(".bubble-icon") ||
          card.querySelector(".bubble-icon-container ha-icon") ||
          card.querySelector("ha-icon.bubble-icon");
      };

      const setMainIcon = (iconName) => {
        const icon = findMainIcon();
        if (!icon || !iconName) return;

        try {
          icon.icon = iconName;
          icon.setAttribute("icon", iconName);
        } catch (e) {}
      };

      const getSubButton = (number) => {
        const direct = card.querySelector(`.bubble-sub-button-${number}`);
        if (direct) return direct;

        const buttons = Array.from(card.querySelectorAll(".bubble-sub-button"));
        return buttons[number - 1] || null;
      };

      const setColorOnElements = (elements, cssColor) => {
        elements.forEach((el) => {
          if (cssColor) {
            el.style.setProperty("color", cssColor, "important");
            el.style.setProperty("fill", cssColor, "important");
            el.style.setProperty("--primary-text-color", cssColor, "important");
            el.style.setProperty("--secondary-text-color", cssColor, "important");
          } else {
            el.style.removeProperty("color");
            el.style.removeProperty("fill");
            el.style.removeProperty("--primary-text-color");
            el.style.removeProperty("--secondary-text-color");
          }
        });
      };

      const styleButton = (button, { background = "", icon = "", text = "", opacity = "", glow = "" } = {}) => {
        if (!button) return;

        if (background) {
          button.style.setProperty("background", background, "important");
          button.style.setProperty("background-color", background, "important");
          button.style.setProperty("--bubble-sub-button-background-color", background, "important");
        } else {
          button.style.removeProperty("background");
          button.style.removeProperty("background-color");
          button.style.removeProperty("--bubble-sub-button-background-color");
        }

        if (opacity !== "") button.style.setProperty("opacity", String(opacity), "important");
        else button.style.removeProperty("opacity");

        button.style.setProperty("box-shadow", glow || "none", "important");

        if (icon) button.style.setProperty("--fan-sub-button-icon-color", icon);
        else button.style.removeProperty("--fan-sub-button-icon-color");

        if (text) {
          button.style.setProperty("--fan-sub-button-text-color", text);
          button.style.setProperty("--primary-text-color", text, "important");
          button.style.setProperty("--secondary-text-color", text, "important");
        } else {
          button.style.removeProperty("--fan-sub-button-text-color");
          button.style.removeProperty("--primary-text-color");
          button.style.removeProperty("--secondary-text-color");
        }

        setColorOnElements(
          button.querySelectorAll("ha-icon, .bubble-sub-button-icon, .bubble-icon"),
          icon
        );

        setColorOnElements(
          button.querySelectorAll(".bubble-sub-button-name, .bubble-sub-button-name-container, .bubble-name, span, p"),
          text
        );
      };

      card.classList.remove(
        "fan-speed-off",
        "fan-speed-low",
        "fan-speed-medium",
        "fan-speed-high",
        "fan-enable-glow",
        "fan-spin-enabled"
      );

      card.classList.add(`fan-speed-${speed}`);

      const inactiveBg = color("inactive_background", "rgba(255,255,255,0.08)");
      const inactiveIcon = color("inactive_icon", "");
      const inactiveText = color("inactive_text", "");
      const inactiveOpacity = Number(config.inactive_opacity ?? 65) / 100;

      setVar("--fan-card-background", color(`${speed}_card`, ""));
      setVar("--fan-icon-background", color(`${speed}_icon_bg`, ""));
      setVar("--fan-icon-color", color(`${speed}_icon`, ""));

      setVar("--fan-inactive-subbutton-background", inactiveBg);
      setVar("--fan-inactive-subbutton-icon-color", inactiveIcon);
      setVar("--fan-inactive-subbutton-text-color", inactiveText);
      card.style.setProperty("--fan-inactive-subbutton-opacity", String(inactiveOpacity));

      const activeButtonBg = color(`${speed}_button_bg`, {
        off: "rgba(255,255,255,0.22)",
        low: "rgba(76,175,80,0.25)",
        medium: "rgba(255,193,7,0.25)",
        high: "rgba(244,67,54,0.25)"
      }[speed]);

      const activeButtonIcon = color(`${speed}_button_icon`, "");
      const activeButtonText = color(`${speed}_button_text`, "");
      const activeGlow = color(`${speed}_glow`, {
        off: "rgba(255,255,255,0.55)",
        low: "rgba(76,175,80,0.85)",
        medium: "rgba(255,193,7,0.85)",
        high: "rgba(244,67,54,0.9)"
      }[speed]);

      const target = Number(config[`${speed}_target`] ?? {
        off: 1,
        low: 2,
        medium: 3,
        high: 4
      }[speed]);

      const glowEnabled = config[`${speed}_glow_enabled`] !== false;
      const glowSize = Number(config[`${speed}_glow_size`] ?? 14);

      for (let i = 1; i <= 8; i++) {
        styleButton(getSubButton(i), {
          background: inactiveBg,
          icon: inactiveIcon,
          text: inactiveText,
          opacity: inactiveOpacity
        });
      }

      const activeButton = getSubButton(target);
      if (activeButton) {
        const glow = glowEnabled && activeGlow && glowSize > 0
          ? `0 0 ${glowSize}px ${activeGlow}`
          : "none";

        if (glow !== "none") card.classList.add("fan-enable-glow");

        styleButton(activeButton, {
          background: activeButtonBg,
          icon: activeButtonIcon || inactiveIcon,
          text: activeButtonText || inactiveText,
          opacity: 1,
          glow
        });
      }

      const baseIcon = this.config.icon || "mdi:fan";
      const offIcon = config.off_icon || "mdi:fan-off";

      if (config.enable_off_icon !== false && !isOn) {
        setMainIcon(offIcon);
        requestAnimationFrame(() => setMainIcon(offIcon));
      } else {
        setMainIcon(baseIcon);
      }

      if (config.enable_spin_animation !== false && isOn) {
        let spinSeconds = Number(config.low_spin_seconds ?? 2.4);
        if (speed === "medium") spinSeconds = Number(config.medium_spin_seconds ?? 1.4);
        if (speed === "high") spinSeconds = Number(config.high_spin_seconds ?? 0.7);

        card.style.setProperty("--fan-spin-speed", `${spinSeconds}s`);
        card.classList.add("fan-spin-enabled");
      } else {
        card.style.removeProperty("--fan-spin-speed");
      }

      return "";
    })()}

    .bubble-button-card-container {
      background: var(--fan-card-background, var(--ha-card-background, var(--card-background-color))) !important;
      transition: background 0.25s ease, box-shadow 0.25s ease !important;
    }

    .bubble-icon-container {
      background: var(--fan-icon-background, var(--bubble-icon-background-color, var(--bubble-secondary-background-color))) !important;
      transition: background 0.25s ease, box-shadow 0.25s ease !important;
    }

    .bubble-icon,
    .bubble-icon-container ha-icon {
      color: var(--fan-icon-color, inherit) !important;
      transition: color 0.25s ease, transform 0.25s ease !important;
    }

    .bubble-sub-button {
      background: var(--fan-inactive-subbutton-background, rgba(255,255,255,0.08)) !important;
      background-color: var(--fan-inactive-subbutton-background, rgba(255,255,255,0.08)) !important;
      opacity: var(--fan-inactive-subbutton-opacity, 0.65) !important;
      transition: background 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease !important;
    }

    .bubble-sub-button ha-icon,
    .bubble-sub-button .bubble-sub-button-icon {
      color: var(--fan-sub-button-icon-color, var(--fan-inactive-subbutton-icon-color, inherit)) !important;
      fill: var(--fan-sub-button-icon-color, var(--fan-inactive-subbutton-icon-color, inherit)) !important;
    }

    .bubble-sub-button .bubble-sub-button-name,
    .bubble-sub-button .bubble-sub-button-name-container,
    .bubble-sub-button span,
    .bubble-sub-button p {
      color: var(--fan-sub-button-text-color, var(--fan-inactive-subbutton-text-color, inherit)) !important;
    }

    @keyframes fan-speed-visual-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .fan-spin-enabled .bubble-icon,
    .fan-spin-enabled .bubble-icon-container ha-icon {
      animation: fan-speed-visual-spin var(--fan-spin-speed, 1.5s) linear infinite !important;
      transform-origin: center center !important;
    }
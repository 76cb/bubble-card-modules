fan_speed_visual_center:
  name: "Fan Speed Visual Center"
  version: "v1.0.0"
  creator: "76cb"
  link: "https://github.com/76cb/bubble-card-modules/tree/main/fan_speed_visual_center"
  supported:
    - button
  description: >
    Advanced Bubble Card module for Home Assistant that provides automatic fan speed detection
    (Off/Low/Medium/High), dynamic UI styling, per-speed animation control, and fully unified
    color selection using native Home Assistant-style editor forms (preset, color wheel, custom,
    and template support).

  editor:
    - type: expandable
      title: "Fan & Speed Detection"
      icon: "mdi:fan"
      schema:
        - type: grid
          column_min_width: "220px"
          schema:
            - name: fan_entity
              label: "Fan Entity"
              selector:
                entity:
                  filter:
                    domain: fan

            - name: low_max
              label: "Low Max Percentage"
              default: 40
              selector:
                number:
                  min: 1
                  max: 100
                  step: 1
                  mode: slider
                  unit_of_measurement: "%"

            - name: medium_max
              label: "Medium Max Percentage"
              default: 80
              selector:
                number:
                  min: 1
                  max: 100
                  step: 1
                  mode: slider
                  unit_of_measurement: "%"

    - type: expandable
      title: "Main Icon"
      icon: "mdi:rotate-360"
      schema:
        - type: grid
          column_min_width: "220px"
          schema:
            - name: enable_off_icon
              label: "Use Off Icon"
              default: true
              selector:
                boolean: {}

            - name: off_icon
              label: "Off Icon"
              default: "mdi:fan-off"
              selector:
                icon: {}

            - name: enable_spin_animation
              label: "Spin Icon When Fan Is On"
              default: true
              selector:
                boolean: {}

        - type: grid
          column_min_width: "180px"
          schema:
            - name: low_spin_seconds
              label: "Low Spin Speed"
              default: 2.4
              selector:
                number:
                  min: 0.2
                  max: 8
                  step: 0.1
                  mode: slider
                  unit_of_measurement: "s"

            - name: medium_spin_seconds
              label: "Medium Spin Speed"
              default: 1.4
              selector:
                number:
                  min: 0.2
                  max: 8
                  step: 0.1
                  mode: slider
                  unit_of_measurement: "s"

            - name: high_spin_seconds
              label: "High Spin Speed"
              default: 0.7
              selector:
                number:
                  min: 0.2
                  max: 8
                  step: 0.1
                  mode: slider
                  unit_of_measurement: "s"

    - type: expandable
      title: "Inactive Sub-Buttons"
      icon: "mdi:gesture-tap-button"
      schema:
        - type: grid
          column_min_width: "220px"
          schema:
            - name: inactive_background_mode
              label: "Color mode"
              default: "preset"
              selector:
                select:
                  mode: dropdown
                  multiple: false
                  custom_value: false
                  options:
                    - label: "Preset color"
                      value: "preset"
                    - label: "Color wheel"
                      value: "wheel"
                    - label: "Custom value"
                      value: "manual"
                    - label: "JS template"
                      value: "template"


            - name: inactive_background_theme
              label: "Background Color"
              selector:
                ui_color:
                  include_none: true
                  include_state: true
            - name: inactive_icon_mode
              label: "Color mode"
              default: "preset"
              selector:
                select:
                  mode: dropdown
                  multiple: false
                  custom_value: false

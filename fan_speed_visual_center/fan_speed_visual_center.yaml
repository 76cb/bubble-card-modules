    @keyframes fan-speed-visual-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.12); opacity: 0.82; }
    }

    @keyframes fan-speed-visual-wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-10deg); }
      75% { transform: rotate(10deg); }
    }

    @keyframes fan-speed-visual-breeze {
      0%, 100% { transform: translateX(0) rotate(0deg) scale(1); }
      25% { transform: translateX(-2px) rotate(-6deg) scale(1.03); }
      50% { transform: translateX(2px) rotate(6deg) scale(0.98); }
      75% { transform: translateX(-1px) rotate(-3deg) scale(1.02); }
    }


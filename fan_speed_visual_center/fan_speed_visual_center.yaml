            - name: off_icon
              label: "Legacy Off Icon"
              description: "Backward-compatible fallback for Main Off Icon."
              default: "mdi:fan-off"
              selector:
                icon: {}
            - name: enable_spin_animation
              label: "Spin Icon When Fan Is On"
              default: true
              selector:
                boolean: {}
            - name: default_spin_seconds
              label: "Default Spin Speed"
              description: "Used when an active speed does not define its own spin speed."
              default: 1.4
              selector:
                number:
                  min: 0.2
                  max: 8
                  step: 0.1
                  mode: slider
                  unit_of_measurement: "s"


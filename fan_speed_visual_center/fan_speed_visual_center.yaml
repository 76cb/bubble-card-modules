fan_speed_visual_center:
  name: "Fan Speed Visual Center"
  version: "v1.3.1"
  creator: "76cb"
  link: "https://raw.githubusercontent.com/76cb/bubble-card-modules/main/fan_speed_visual_center/fan_speed_visual_center.yaml"
  supported:
    - button
  description: >
    Advanced Bubble Card module for Home Assistant fan and climate fan controls.
    Uses normal Bubble Card sub-buttons or the main icon for Off/Power, fan speed percentages,
    climate fan modes, fan/climate presets, select and input_select options/dropdowns,
    optional direction, scalable button mapping, animation, and theme-aware
    active/inactive/off styling. Off is configured separately.

  editor:
    - type: expandable
      title: "Control Entity"
      icon: "mdi:fan"
      schema:
        - type: grid
          column_min_width: "220px"
          schema:
            - name: fan_entity
              label: "Fan or Climate Entity"
              description: "Primary entity controlled by the power button and main icon. The existing fan_entity key is retained for backward compatibility."
              selector:
                entity:
                  filter:
                    - domain: fan
                    - domain: climate
            - name: control_mode
              label: "Primary Speed Control"
              description: "Auto uses percentage controls for fan entities and Mode / Select Buttons for climate fan modes."
              default: "auto"
              selector:
                select:
                  mode: dropdown
                  options:
                    - label: "Auto"
                      value: "auto"
                    - label: "Fan percentage"
                      value: "percentage"
                    - label: "Climate fan mode"
                      value: "climate_fan_mode"

    - type: expandable
      title: "Button Mapping"
      icon: "mdi:gesture-tap-button"
      schema:
        - type: grid
          column_min_width: "220px"
          schema:
            - name: off_target_mode
              label: "Off / Power Target"
              description: "Use a Bubble Card sub-button, or bind Off / Power to the main icon without requiring a sub-button number."
              default: "sub_button"
              selector:
                select:
                  mode: dropdown
                  options:
                    - label: "Sub-button"
                      value: "sub_button"
                    - label: "Main icon"
                      value: "main_icon"
            - name: off_target
              label: "Off / Power Button Number"
              description: "Used only when Off / Power Target is Sub-button. Button numbers start at 1."
              default: 1
              selector:
                number:
                  min: 1
                  max: 20
                  step: 1
                  mode: box
            - name: speed_sub_button_start_index
              label: "First Speed Button Number"
              description: "The first sub-button used for speed controls. Speed 1 uses this number, Speed 2 uses the next number, and so on."
              default: 2
              selector:
                number:
                  min: 1
                  max: 20
                  step: 1
                  mode: box
            - name: auto_map_speed_buttons
              label: "Auto-map Speed Buttons"
              description: "Automatically map speeds in order based on the first speed button number. Individual speed Button Number values override this."
              default: true
              selector:
                boolean: {}
            - name: clear_all_sub_buttons
              label: "Reset All Sub-Buttons"
              description: "Reset all visible sub-buttons before applying active styles. Leave off unless old styling appears stuck."
              default: false
              selector:
                boolean: {}
            - name: sub_button_layout
              label: "Sub-Button Layout"
              default: "bubble_default"
              selector:
                select:
                  mode: dropdown
                  options:
                    - label: "Bubble Card default"
                      value: "bubble_default"
                    - label: "Control row"
                      value: "control_row"
                    - label: "Compact fill row"
                      value: "compact_fill_row"
                    - label: "Bottom control row"
                      value: "bottom_control_row"
            - name: hide_main_name_state
              label: "Hide Main Name/State"
              description: "Keeps the main icon visible, but hides the main name and state to make room for fan controls."
              default: false
              selector:
                boolean: {}
            - name: sub_button_min_width
              label: "Button Min Width"
              default: 48
              selector:
                number:
                  min: 24
                  max: 120
                  step: 1
                  mode: slider
                  unit_of_measurement: "px"
            - name: sub_button_max_width
              label: "Button Max Width"
              description: "Used by Compact fill row to keep buttons from becoming giant pills."
              default: 68
              selector:
                number:
                  min: 36
                  max: 140
                  step: 1
                  mode: slider
                  unit_of_measurement: "px"
            - name: sub_button_justify
              label: "Button Row Spacing"
              description: "Used by Compact fill row."
              default: "space-between"
              selector:
                select:
                  mode: dropdown
                  options:
                    - label: "Space between"
                      value: "space-between"
                    - label: "Center"
                      value: "center"
                    - label: "Start"
                      value: "flex-start"
                    - label: "End"
                      value: "flex-end"
            - name: sub_button_gap
              label: "Button Gap"
              default: 6
              selector:
                number:
                  min: 0
                  max: 24
                  step: 1
                  mode: slider
                  unit_of_measurement: "px"

    - type: expandable
      title: "Speeds"
      icon: "mdi:speedometer"
      schema:
        - name: speeds
          label: "Speed Buttons"
          description: "Percentage buttons for fan entities. Do not add Off. Climate fan modes and dropdown/select options belong in Mode / Select Buttons. Supports 2 to 10 speed buttons."
          selector:
            object:
              multiple: true
              label_field: name
              fields:
                name:
                  label: "Speed Name"
                  description: "User-facing speed name. Examples: Low, Medium, High, 1, 2, 3, Quiet, Sleep, Turbo."
                  selector:
                    text:
                      multiline: false
                value:
                  label: "Speed Percentage"
                  description: "The percentage sent to fan.set_percentage when this speed is tapped. Off is not valid here."
                  selector:
                    number:
                      min: 1
                      max: 100
                      step: 1
                      mode: slider
                      unit_of_measurement: "%"
                icon:
                  label: "Speed Icon"
                  description: "Icon for this speed's sub-button and optionally the main icon."
                  selector:
                    icon: {}
                sub_button_index:
                  label: "Button Number"
                  description: "Optional. Leave blank to auto-map this speed. If set, this speed uses this exact Bubble Card sub-button number."
                  selector:
                    number:
                      min: 1
                      max: 20
                      step: 1
                      mode: box
                style_preset:
                  label: "Style Preset"
                  description: "Optional active styling preset for this speed. If unset, the module assigns one automatically by speed order."
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: "Auto"
                          value: "auto"
                        - label: "Style Preset 1"
                          value: "low"
                        - label: "Style Preset 2"
                          value: "medium"
                        - label: "Style Preset 3"
                          value: "high"
                animate_icon:
                  label: "Animate Main Icon"
                  default: true
                  selector:
                    boolean: {}
                spin_seconds:
                  label: "Spin Speed"
                  description: "Main icon spin speed when this speed is active. Lower numbers spin faster."
                  selector:
                    number:
                      min: 0.2
                      max: 8
                      step: 0.1
                      mode: slider
                      unit_of_measurement: "s"
                action_enabled:
                  label: "Enable Tap Action"
                  default: true
                  selector:
                    boolean: {}
                button_bg_override:
                  label: "Active Button Background Override"
                  description: "Optional CSS color for this speed's active button. Leave blank to use the selected Style Preset."
                  selector:
                    text: {}
                button_icon_override:
                  label: "Active Button Icon Override"
                  description: "Optional CSS color for this speed's active button icon."
                  selector:
                    text: {}
                button_text_override:
                  label: "Active Button Text Override"
                  description: "Optional CSS color for this speed's active button text."
                  selector:
                    text: {}
                glow_override:
                  label: "Glow Color Override"
                  description: "Optional CSS color for this speed's active glow."
                  selector:
                    text: {}

    - type: expandable
      title: "Main Icon / Animation"
      icon: "mdi:rotate-360"
      schema:
        - type: grid
          column_min_width: "220px"
          schema:
            - name: main_icon_behavior
              label: "Main Icon Behavior"
              description: "Keep card icon leaves the Bubble Card icon unchanged and only animates/colors it."
              default: "keep_card_icon"
              selector:
                select:
                  mode: dropdown
                  options:
                    - label: "Keep card icon"
                      value: "keep_card_icon"
                    - label: "Active speed icon"
                      value: "active_speed_icon"
                    - label: "On/Off icons"
                      value: "on_off_icon"
            - name: main_icon_action
              label: "Main Icon Tap Action"
              description: "Use the main icon container as the power control, or leave Bubble Card's configured icon action unchanged."
              default: "bubble_default"
              selector:
                select:
                  mode: dropdown
                  options:
                    - label: "Use Bubble Card action"
                      value: "bubble_default"
                    - label: "Toggle on/off"
                      value: "toggle"
                    - label: "Turn on"
                      value: "turn_on"
                    - label: "Turn off"
                      value: "turn_off"
                    - label: "No action"
                      value: "none"
            - name: main_on_icon
              label: "Main On Icon"
              default: "mdi:fan"
              selector:
                icon: {}
            - name: main_off_icon
              label: "Main Off Icon"
              default: "mdi:fan-off"
              selector:
                icon: {}
            - name: enable_off_icon
              label: "Use Off Icon"
              default: true
              selector:

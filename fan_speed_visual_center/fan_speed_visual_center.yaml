      // keep_card_icon: do nothing. Leave Bubble Card's selected icon alone.

      const mainIconTarget = card.querySelector(".bubble-icon-container") || findMainIcon();
      const mainIconAction = config.main_icon_action || "bubble_default";
      if (offUsesMainIcon && mainIconAction === "bubble_default") {
        attachAction(mainIconTarget, () => {
          if ((config.power_button_mode || "off_only") === "toggle" && fanOff) callControlService("turn_on");
          else callControlService("turn_off");
        }, config.off_action_enabled !== false);
      } else if (mainIconAction === "toggle") {
        attachAction(mainIconTarget, () => callControlService(fanOff ? "turn_on" : "turn_off"));
      } else if (mainIconAction === "turn_on" || mainIconAction === "turn_off") {

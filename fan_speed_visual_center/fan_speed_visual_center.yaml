          } else {
            card.classList.add("fan-spin-enabled");
            if (presetAnimationMode === "reverse_spin") card.classList.add("fan-spin-reverse");
          }
        } else {
          const spinSeconds = Number(activeSpeed?.spin_seconds ?? config.default_spin_seconds ?? 1.4);
          card.style.setProperty("--fan-spin-speed", `${spinSeconds}s`);

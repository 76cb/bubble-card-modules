                          value: "select_option"
                        - label: "Input select option"
                          value: "input_select_option"
                        - label: "More info / dropdown"
                          value: "more_info"
                display_mode:
                  label: "Button Display"
                  description: "Fixed label shows Button Label. Mirror state shows the target entity state or active attribute, which works well for select/input_select dropdown buttons."
                  default: "fixed"
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: "Fixed label"
                          value: "fixed"
                        - label: "Mirror state / attribute"
                          value: "mirror_state"
                active_attribute:
                  label: "Active Attribute"
                  description: "Optional. Auto uses preset_mode, fan_mode, or state based on Action Type. Enter state to compare the entity state directly."
                  selector:
                    text: {}
                affect_main_card:
                  label: "Affect Main Card Style / Icon"
                  description: "When active, this mapping may control the main card style, icon, and animation. The first active enabled mapping wins."
                  default: true
                  selector:
                    boolean: {}
                turn_on_first:
                  label: "Turn Target On First"
                  description: "Optional per-button override. Applies only to fan and climate targets."
                  selector:
                    boolean: {}
                icon:
                  label: "Button Icon"
                  description: "Icon used on the mapped sub-button."
                  selector:
                    icon: {}
                main_icon:
                  label: "Main Icon When Active"
                  description: "Optional. Replaces the main card icon while this preset is active."
                  selector:
                    icon: {}
                animation_mode:
                  label: "Main Icon Animation"
                  description: "Animation used on the main card icon while this preset is active."
                  default: "spin"
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: "None"
                          value: "none"
                        - label: "Spin"
                          value: "spin"
                        - label: "Reverse Spin"
                          value: "reverse_spin"
                        - label: "Pulse"
                          value: "pulse"
                        - label: "Wobble"
                          value: "wobble"
                        - label: "Breeze"
                          value: "breeze"
                spin_seconds:
                  label: "Animation Speed"
                  description: "Lower numbers animate faster. Used only while this preset is active."
                  default: 1.8
                  selector:
                    number:
                      min: 0.2
                      max: 10
                      step: 0.1
                      mode: slider
                      unit_of_measurement: "s"
                sub_button_index:
                  label: "Button Number"
                  selector:
                    number:
                      min: 1
                      max: 20
                      step: 1
                      mode: box
                style_preset:
                  label: "Style Preset"
                  description: "Active styling preset for this preset button. Color controls below can override this preset for Breeze/Smart or other fan presets."
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: "Style Preset 1"
                          value: "low"
                        - label: "Style Preset 2"
                          value: "medium"
                        - label: "Style Preset 3"
                          value: "high"
                button_bg_mode:
                  label: "Button Background Mode"
                  description: "Preset uses the selected Style Preset. Other modes override only this preset button."
                  default: "style_preset"
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: "Use Style Preset"
                          value: "style_preset"
                        - label: "Use Bubble Card / theme"
                          value: "inherit"
                        - label: "Preset color"
                          value: "preset"
                        - label: "Color wheel"
                          value: "wheel"
                        - label: "Custom value"
                          value: "manual"
                        - label: "JS template"
                          value: "template"
                button_bg_theme:
                  label: "Button Background"
                  selector:
                    ui_color:
                      include_none: true
                      include_state: true
                button_bg_wheel:
                  label: "Button Background Color Wheel"
                  selector:
                    color_rgb: {}
                button_bg_manual:
                  label: "Button Background Custom Value"
                  description: "CSS color, for example rgba(0, 188, 212, 0.28)."
                  selector:
                    text: {}
                button_bg_template:
                  label: "Button Background JS Template"
                  description: "Return a CSS color. Available variables: hass, entity, state, pct, preset, currentPreset."
                  selector:
                    text:
                      multiline: true

                button_icon_mode:
                  label: "Button Icon Mode"
                  default: "style_preset"
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: "Use Style Preset"
                          value: "style_preset"
                        - label: "Use Bubble Card / theme"
                          value: "inherit"
                        - label: "Preset color"
                          value: "preset"
                        - label: "Color wheel"
                          value: "wheel"
                        - label: "Custom value"
                          value: "manual"
                        - label: "JS template"
                          value: "template"
                button_icon_theme:
                  label: "Button Icon Color"
                  selector:
                    ui_color:
                      include_none: true
                      include_state: true
                button_icon_wheel:
                  label: "Button Icon Color Wheel"
                  selector:
                    color_rgb: {}
                button_icon_manual:
                  label: "Button Icon Custom Value"
                  selector:
                    text: {}
                button_icon_template:
                  label: "Button Icon JS Template"
                  description: "Return a CSS color. Available variables: hass, entity, state, pct, preset, currentPreset."
                  selector:
                    text:
                      multiline: true

                button_text_mode:
                  label: "Button Text Mode"
                  default: "style_preset"
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: "Use Style Preset"
                          value: "style_preset"
                        - label: "Use Bubble Card / theme"
                          value: "inherit"
                        - label: "Preset color"
                          value: "preset"
                        - label: "Color wheel"
                          value: "wheel"
                        - label: "Custom value"
                          value: "manual"
                        - label: "JS template"
                          value: "template"
                button_text_theme:
                  label: "Button Text Color"
                  selector:
                    ui_color:
                      include_none: true
                      include_state: true
                button_text_wheel:
                  label: "Button Text Color Wheel"
                  selector:
                    color_rgb: {}
                button_text_manual:
                  label: "Button Text Custom Value"
                  selector:
                    text: {}
                button_text_template:
                  label: "Button Text JS Template"
                  description: "Return a CSS color. Available variables: hass, entity, state, pct, preset, currentPreset."
                  selector:
                    text:
                      multiline: true

                glow_mode:
                  label: "Glow Mode"
                  default: "style_preset"
                  selector:
                    select:
                      mode: dropdown
                      options:
                        - label: "Use Style Preset"
                          value: "style_preset"
                        - label: "Use Bubble Card / theme"
                          value: "inherit"
                        - label: "Preset color"
                          value: "preset"
                        - label: "Color wheel"
                          value: "wheel"
                        - label: "Custom value"
                          value: "manual"
                        - label: "JS template"
                          value: "template"
                glow_theme:
                  label: "Glow Color"
                  selector:
                    ui_color:
                      include_none: true
                      include_state: true
                glow_wheel:
                  label: "Glow Color Wheel"
                  selector:
                    color_rgb: {}
                glow_manual:
                  label: "Glow Custom Value"
                  selector:
                    text: {}
                glow_template:
                  label: "Glow JS Template"
                  description: "Return a CSS color. Available variables: hass, entity, state, pct, preset, currentPreset."
                  selector:
                    text:
                      multiline: true
                glow_enabled:
                  label: "Enable Button Glow"
                  default: true
                  selector:
                    boolean: {}
                glow_size:
                  label: "Button Glow Size"
                  default: 14
                  selector:
                    number:
                      min: 0
                      max: 40
                      step: 1
                      mode: slider
                      unit_of_measurement: "px"
                action_enabled:
                  label: "Enable Tap Action"
                  default: true
                  selector:
                    boolean: {}

    - type: expandable
      title: "Advanced"
      icon: "mdi:cog-outline"
      schema:
        - type: grid
          column_min_width: "220px"
          schema:
            - name: debug
              label: "Debug Logging"
              default: false
              selector:
                boolean: {}

  code: |
    ${(() => {
      const config = this.config.fan_speed_visual_center || {};
      // fan_entity is retained as the configuration key for backward compatibility,
      // but it may now reference either a fan or climate entity.
      const fanEntity = config.fan_entity || this.config.entity;
      const fan = fanEntity ? hass.states[fanEntity] : null;
      const controlDomain = String(fanEntity || "").split(".")[0];
      const controlMode = config.control_mode || "auto";

      const state = fan?.state || "off";
      const pct = Number(fan?.attributes?.percentage || 0);
      const hardOffStates = ["off", "unavailable", "unknown"];
      const baseIsOn = !!fan && !hardOffStates.includes(state);
      const percentageControlsEnabled = controlMode === "percentage" || (controlMode === "auto" && controlDomain === "fan");
      const debug = (...args) => { if (config.debug) console.debug("[fan_speed_visual_center]", ...args); };

      const clampNumber = (value, min, max) => {
        const n = Number(value);
        if (!Number.isFinite(n)) return null;
        return Math.min(max, Math.max(min, n));
      };

      const rgbToCss = (rgb) => {
        if (!Array.isArray(rgb)) return "";
        return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
      };

      const themeToCss = (value) => {
        if (!value || value === "none") return "";
        if (value === "state") return "var(--state-icon-active-color)";
        if (value === "transparent") return "transparent";
        const raw = String(value).trim();
        if (
          raw.startsWith("#") || raw.startsWith("rgb") || raw.startsWith("hsl") ||
          raw.startsWith("var(") || raw === "white" || raw === "black" || raw === "transparent"
        ) return raw;
        return `var(--${raw}-color, ${raw})`;
      };

      const templateToCss = (template, extra = {}) => {
        if (!template) return "";
        try {
          return Function("hass", "entity", "state", "pct", "activeSpeed", "styleKey", `return (${template});`)(hass, fan, state, pct, extra.activeSpeed, extra.styleKey) || "";
        } catch (e) {
          try {
            return Function("hass", "entity", "state", "pct", "activeSpeed", "styleKey", template)(hass, fan, state, pct, extra.activeSpeed, extra.styleKey) || "";
          } catch (err) {
            debug("Template color failed", err);
            return "";
          }
        }
      };

      const color = (base, fallback = "", extra = {}, defaultMode = "preset") => {
        const mode = config[`${base}_mode`] || defaultMode;
        if (mode === "inherit") return fallback;
        if (mode === "manual") return String(config[`${base}_manual`] || "").trim() || fallback;
        if (mode === "wheel") return rgbToCss(config[`${base}_wheel`]) || fallback;
        if (mode === "template") return String(templateToCss(config[`${base}_template`], extra)).trim() || fallback;
        return themeToCss(config[`${base}_theme`]) || fallback;
      };

      const objectTemplateToCss = (template, preset = {}) => {
        if (!template) return "";
        const mappingCurrentValue = getPresetContext(preset).currentValue;
        try {
          return Function("hass", "entity", "state", "pct", "preset", "currentPreset", `return (${template});`)(hass, fan, state, pct, preset, mappingCurrentValue) || "";
        } catch (e) {
          try {
            return Function("hass", "entity", "state", "pct", "preset", "currentPreset", template)(hass, fan, state, pct, preset, mappingCurrentValue) || "";
          } catch (err) {
            debug("Preset template color failed", err);
            return "";
          }
        }
      };

      const objectColor = (obj, base, fallback = "") => {
        if (!obj) return fallback;

        // Backward-compatible support for the older CSS-only override fields.
        const legacyKey = base === "button_bg" ? "button_bg_override"
          : base === "button_icon" ? "button_icon_override"
          : base === "button_text" ? "button_text_override"
          : base === "glow" ? "glow_override"
          : "";
        if (legacyKey && obj[legacyKey]) return String(obj[legacyKey]).trim() || fallback;

        const mode = obj[`${base}_mode`] || "style_preset";
        if (mode === "style_preset" || mode === "inherit") return fallback;
        if (mode === "preset") return themeToCss(obj[`${base}_theme`]) || fallback;
        if (mode === "manual") return String(obj[`${base}_manual`] || "").trim() || fallback;
        if (mode === "wheel") return rgbToCss(obj[`${base}_wheel`]) || fallback;
        if (mode === "template") return String(objectTemplateToCss(obj[`${base}_template`], obj)).trim() || fallback;
        return themeToCss(obj[`${base}_theme`]) || fallback;
      };

      const setVar = (name, value) => {
        if (value) card.style.setProperty(name, value);
        else card.style.removeProperty(name);
      };

      const setScopedVar = (name, value, className) => {
        setVar(name, value);
        card.classList.toggle(className, !!value);
      };

      const getConfiguredSpeeds = () => {
        const raw = Array.isArray(config.speeds) ? config.speeds : [];
        const speeds = [];
        raw.forEach((s, idx) => {
          const value = clampNumber(s?.value, 1, 100);
          if (value === null) {
            debug("Ignoring invalid speed entry because value is missing or invalid.", s);
            return;
          }
          speeds.push({
            ...s,
            index: speeds.length,
            value,
            name: String(s?.name || `Speed ${speeds.length + 1}`),
            icon: s?.icon || "mdi:fan",
            animate_icon: s?.animate_icon !== false,
            action_enabled: s?.action_enabled !== false,
          });
        });

        if (speeds.length > 0) return percentageControlsEnabled ? speeds.slice(0, 10).sort((a, b) => a.value - b.value) : [];
        if (!percentageControlsEnabled) return [];

        // Backward-compatible fallback for the original 3-speed fan config.
        const lowMax = Number(config.low_max ?? 40);
        const mediumMax = Number(config.medium_max ?? 80);
        return [
          { index: 0, name: "Speed 1", value: lowMax, icon: "mdi:fan-speed-1", animate_icon: true, action_enabled: true, style_preset: "low" },
          { index: 1, name: "Speed 2", value: mediumMax, icon: "mdi:fan-speed-2", animate_icon: true, action_enabled: true, style_preset: "medium" },
          { index: 2, name: "Speed 3", value: 100, icon: "mdi:fan-speed-3", animate_icon: true, action_enabled: true, style_preset: "high" },
        ];
      };

      const speeds = getConfiguredSpeeds();

      const normalizeStyleKey = (value) => {
        if (["low", "medium", "high"].includes(value)) return value;
        if (["preset_1", "style_1", "1"].includes(String(value))) return "low";
        if (["preset_2", "style_2", "2"].includes(String(value))) return "medium";
        if (["preset_3", "style_3", "3"].includes(String(value))) return "high";
        return "";
      };

      const presetMappings = config.enable_presets === true && Array.isArray(config.preset_mappings)
        ? config.preset_mappings.filter((mapping) => {
          if (!mapping) return false;
          const actionType = String(mapping.action_type || "auto");
          return actionType === "more_info" || (mapping.preset_value !== undefined && mapping.preset_value !== null);
        })
        : [];

      const inferMappingActionType = (mapping, targetEntity) => {
        const explicit = String(mapping?.action_type || "auto");
        if (explicit !== "auto") return explicit;
        const domain = String(targetEntity || "").split(".")[0];
        if (domain === "climate") return "climate_fan_mode";
        if (domain === "select") return "select_option";
        if (domain === "input_select") return "input_select_option";
        return "fan_preset";
      };

      const defaultActiveAttribute = (mapping, actionType) => {
        const configured = String(mapping?.active_attribute || "").trim();
        if (configured) return configured;
        if (actionType === "more_info") return "state";
        if (actionType === "climate_fan_mode") return "fan_mode";
        if (actionType === "climate_preset" || actionType === "fan_preset") {
          return String(config.preset_attribute || "preset_mode");
        }
        return "state";
      };

      const getPresetContext = (mapping) => {
        const targetEntity = mapping?.target_entity || fanEntity;
        const target = targetEntity ? hass.states[targetEntity] : null;
        const actionType = inferMappingActionType(mapping, targetEntity);
        const activeAttribute = defaultActiveAttribute(mapping, actionType);
        const currentValue = activeAttribute === "state"
          ? String(target?.state || "")
          : String(target?.attributes?.[activeAttribute] ?? "");
        return { targetEntity, target, actionType, activeAttribute, currentValue };
      };

      const isPresetActive = (mapping) => {
        if (!mapping || mapping.preset_value === undefined || mapping.preset_value === null) return false;
        const { currentValue, actionType } = getPresetContext(mapping);
        if (actionType === "more_info") return false;
        return currentValue === String(mapping.preset_value);
      };

      const activePresetMappings = presetMappings.filter(isPresetActive);
      const controlPresetMatch = activePresetMappings.find((mapping) => {
        const ctx = getPresetContext(mapping);
        return ctx.targetEntity === fanEntity && ["fan_preset", "climate_fan_mode", "climate_preset"].includes(ctx.actionType);
      }) || null;
      const presetMatch = activePresetMappings.find((mapping) => mapping.affect_main_card !== false) || controlPresetMatch || null;
      const currentPreset = presetMatch ? getPresetContext(presetMatch).currentValue : "";

      const getActiveSpeed = () => {
        // Presets like Inovelli Smart/Breeze are exclusive active modes.
        // Do not also highlight a normal percentage speed while a configured preset is active.
        if (controlPresetMatch) return null;
        if (!baseIsOn || pct <= 0 || speeds.length === 0) return null;
        return speeds.reduce((best, s) => {
          if (!best) return s;
          const d = Math.abs(s.value - pct);
          const bd = Math.abs(best.value - pct);
          if (d < bd) return s;
          if (d === bd && s.value > best.value) return s;
          return best;
        }, null);
      };

      const activeSpeed = getActiveSpeed();

      const getStyleKeyForSpeed = (speed) => {
        const explicit = normalizeStyleKey(speed?.style_preset || speed?.style_bucket);
        if (explicit) return explicit;
        const count = Math.max(1, speeds.length);
        const position = speed ? speed.index / Math.max(1, count - 1) : 0;
        if (position <= 0.33) return "low";
        if (position <= 0.66) return "medium";
        return "high";
      };

      // A primary fan/climate mode mapping can keep the control visually active even
      // when that integration reports an off-like state while changing modes. External
      // select mappings never force the primary device on.
      const presetKeepsControlActive = !!controlPresetMatch && controlPresetMatch.treat_as_active !== false;
      const fanOff = hardOffStates.includes(state) && !presetKeepsControlActive;
      const activeStyleKey = fanOff
        ? "off"
        : (presetMatch
          ? (normalizeStyleKey(presetMatch.style_preset) || "medium")
          : (activeSpeed ? getStyleKeyForSpeed(activeSpeed) : "low"));

      const findMainIcon = () => card.querySelector(".bubble-icon") || card.querySelector(".bubble-icon-container ha-icon") || card.querySelector("ha-icon.bubble-icon");
      const setMainIcon = (iconName) => {
        const icon = findMainIcon();
        if (!icon || !iconName) return;
        try { icon.icon = iconName; icon.setAttribute("icon", iconName); } catch (e) {}
      };

      const setIconInButton = (button, iconName) => {
        if (!button || !iconName) return;
        const icon = button.querySelector("ha-icon");
        if (!icon) return;
        try { icon.icon = iconName; icon.setAttribute("icon", iconName); } catch (e) {}
      };

      const setTextInButton = (button, text) => {
        if (!button || text === undefined || text === null || text === "") return;
        const label = button.querySelector(".bubble-sub-button-name, .bubble-sub-button-name-container, .bubble-name, span, p");
        if (!label) return;
        label.textContent = String(text);
      };

      const getSubButton = (number) => {
        const n = Number(number);
        if (!Number.isFinite(n) || n < 1) return null;
        const direct = card.querySelector(`.bubble-sub-button-${n}`);
        if (direct) return direct;
        const buttons = Array.from(card.querySelectorAll(".bubble-sub-button"));
        return buttons[n - 1] || null;
      };

      const getSpeedButtonNumber = (speed) => {
        const explicit = Number(speed?.sub_button_index);
        if (Number.isFinite(explicit) && explicit >= 1) return explicit;
        if (config.auto_map_speed_buttons !== false) return Number(config.speed_sub_button_start_index ?? 2) + speed.index;
        return null;
      };

      const setColorOnElements = (elements, cssColor) => {
        elements.forEach((el) => {
          if (cssColor) {
            el.style.setProperty("color", cssColor, "important");
            el.style.setProperty("fill", cssColor, "important");
            el.style.setProperty("--primary-text-color", cssColor, "important");
            el.style.setProperty("--secondary-text-color", cssColor, "important");
          } else {
            el.style.removeProperty("color");
            el.style.removeProperty("fill");
            el.style.removeProperty("--primary-text-color");
            el.style.removeProperty("--secondary-text-color");
          }
        });
      };

      const styleButton = (button, { background = "", icon = "", text = "", opacity = "", glow = "" } = {}) => {
        if (!button) return;
        if (background) {
          button.style.setProperty("background", background, "important");
          button.style.setProperty("background-color", background, "important");
          button.style.setProperty("--bubble-sub-button-background-color", background, "important");
        } else {
          button.style.removeProperty("background");
          button.style.removeProperty("background-color");
          button.style.removeProperty("--bubble-sub-button-background-color");
        }
        if (opacity !== "") button.style.setProperty("opacity", String(opacity), "important");
        else button.style.removeProperty("opacity");
        if (glow !== "") button.style.setProperty("box-shadow", glow || "none", "important");
        else button.style.removeProperty("box-shadow");
        if (icon) button.style.setProperty("--fan-sub-button-icon-color", icon);
        else button.style.removeProperty("--fan-sub-button-icon-color");
        if (text) {
          button.style.setProperty("--fan-sub-button-text-color", text);
          button.style.setProperty("--primary-text-color", text, "important");
          button.style.setProperty("--secondary-text-color", text, "important");
        } else {
          button.style.removeProperty("--fan-sub-button-text-color");
          button.style.removeProperty("--primary-text-color");
          button.style.removeProperty("--secondary-text-color");
        }
        setColorOnElements(button.querySelectorAll("ha-icon, .bubble-sub-button-icon, .bubble-icon"), icon);
        setColorOnElements(button.querySelectorAll(".bubble-sub-button-name, .bubble-sub-button-name-container, .bubble-name, span, p"), text);
      };

      const detachAction = (button) => {
        if (!button || button.dataset?.fanSpeedVisualAction !== "true") return;
        button.onclick = button.__fanSpeedVisualPreviousOnclick || null;
        delete button.__fanSpeedVisualPreviousOnclick;
        delete button.dataset.fanSpeedVisualAction;
        button.style.removeProperty("cursor");
      };

      const attachAction = (button, fn, enabled = true) => {
        if (!button) return;
        detachAction(button);
        if (!enabled) return;
        button.__fanSpeedVisualPreviousOnclick = button.onclick || null;
        button.dataset.fanSpeedVisualAction = "true";
        button.style.setProperty("cursor", "pointer");
        button.onclick = (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          try { fn(); } catch (err) { debug("Action failed", err); }
        };
      };

      const callEntityService = (domain, service, entityId, data = {}) => {
        if (!domain || !service || !entityId || !hass?.callService) {
          debug("Skipping service call; missing domain, service, entity, or hass.callService", domain, service, entityId, data);
          return;
        }
        hass.callService(domain, service, { entity_id: entityId, ...data });
      };

      const callControlService = (service, data = {}) => {
        const domain = ["fan", "climate"].includes(controlDomain) ? controlDomain : "homeassistant";
        callEntityService(domain, service, fanEntity, data);
      };

      const callFanService = (service, data = {}) => {
        if (controlDomain !== "fan") {
          debug(`Ignoring fan.${service}; primary entity is ${controlDomain || "unknown"}.`);
          return;
        }
        callEntityService("fan", service, fanEntity, data);
      };

      const callMappedAction = (mapping) => {
        const ctx = getPresetContext(mapping);
        const value = mapping?.preset_value;
        if (ctx.actionType === "more_info") {
          const event = new Event("hass-more-info", { bubbles: true, composed: true });
          event.detail = { entityId: ctx.targetEntity };
          card.dispatchEvent(event);
          return;
        }
        const specs = {
          fan_preset: { domain: "fan", service: "set_preset_mode", field: "preset_mode" },
          climate_fan_mode: { domain: "climate", service: "set_fan_mode", field: "fan_mode" },
          climate_preset: { domain: "climate", service: "set_preset_mode", field: "preset_mode" },
          select_option: { domain: "select", service: "select_option", field: "option" },
          input_select_option: { domain: "input_select", service: "select_option", field: "option" },
        };
        const spec = specs[ctx.actionType];
        if (!spec) {
          debug("Unsupported mapping action type", ctx.actionType, mapping);
          return;
        }
        const execute = () => callEntityService(spec.domain, spec.service, ctx.targetEntity, { [spec.field]: value });
        const targetDomain = String(ctx.targetEntity || "").split(".")[0];
        const perButtonTurnOn = mapping?.turn_on_first;
        const shouldTurnOnFirst = ["fan", "climate"].includes(targetDomain)
          && (perButtonTurnOn === true || (perButtonTurnOn === undefined && config.preset_turn_on_first !== false))
          && hardOffStates.includes(String(ctx.target?.state || "off"));
        if (shouldTurnOnFirst) {
          callEntityService(targetDomain, "turn_on", ctx.targetEntity);
          const delay = Math.max(0, Number(config.preset_set_delay_ms ?? 350));
          window.setTimeout(execute, delay);
        } else {
          execute();
        }
      };

      card.classList.remove(
        "fan-speed-off", "fan-speed-active", "fan-style-low", "fan-style-medium", "fan-style-high",
        "fan-enable-glow", "fan-spin-enabled", "fan-spin-reverse",
        "fan-preset-pulse", "fan-preset-wobble", "fan-preset-breeze",
        "fan-layout-control-row", "fan-layout-compact-fill-row", "fan-layout-bottom-control-row", "fan-hide-main-name-state",
        "fan-custom-card-background", "fan-custom-icon-background", "fan-custom-icon-color",
        "fan-custom-inactive-background", "fan-custom-inactive-icon", "fan-custom-inactive-text", "fan-custom-inactive-opacity"
      );
      card.querySelectorAll('[data-fan-speed-visual-action="true"]').forEach(detachAction);
      card.classList.add(fanOff ? "fan-speed-off" : "fan-speed-active");
      if (activeSpeed) card.classList.add(`fan-style-${activeStyleKey}`);
      if (config.sub_button_layout === "control_row") card.classList.add("fan-layout-control-row");
      if (config.sub_button_layout === "compact_fill_row") card.classList.add("fan-layout-compact-fill-row");
      if (config.sub_button_layout === "bottom_control_row") card.classList.add("fan-layout-bottom-control-row");
      if (config.hide_main_name_state === true) card.classList.add("fan-hide-main-name-state");
      card.style.setProperty("--fan-sub-button-min-width", `${Number(config.sub_button_min_width ?? 48)}px`);
      card.style.setProperty("--fan-sub-button-max-width", `${Number(config.sub_button_max_width ?? 68)}px`);
      card.style.setProperty("--fan-sub-button-gap", `${Number(config.sub_button_gap ?? 6)}px`);
      card.style.setProperty("--fan-sub-button-justify", String(config.sub_button_justify || "space-between"));

      const inactiveBg = color("inactive_background", "", {}, "inherit");
      const inactiveIcon = color("inactive_icon", "", {}, "inherit");
      const inactiveText = color("inactive_text", "", {}, "inherit");
      const useInactiveOpacity = config.inactive_opacity_mode === "custom";
      const inactiveOpacity = useInactiveOpacity ? Number(config.inactive_opacity ?? 65) / 100 : "";
      setScopedVar("--fan-inactive-subbutton-background", inactiveBg, "fan-custom-inactive-background");
      setScopedVar("--fan-inactive-subbutton-icon-color", inactiveIcon, "fan-custom-inactive-icon");
      setScopedVar("--fan-inactive-subbutton-text-color", inactiveText, "fan-custom-inactive-text");
      setScopedVar("--fan-inactive-subbutton-opacity", inactiveOpacity, "fan-custom-inactive-opacity");

      const offUsesMainIcon = config.off_target_mode === "main_icon";
      const knownTargets = new Set();
      if (!offUsesMainIcon) knownTargets.add(Number(config.off_target ?? 1));
      speeds.forEach((s) => { const n = getSpeedButtonNumber(s); if (n) knownTargets.add(n); });
      if (config.enable_direction === true) knownTargets.add(Number(config.direction_sub_button_index ?? 5));
      presetMappings.forEach((p) => { if (Number(p?.sub_button_index)) knownTargets.add(Number(p.sub_button_index)); });

      const buttonsToReset = config.clear_all_sub_buttons === true
        ? Array.from(card.querySelectorAll(".bubble-sub-button"))
        : Array.from(knownTargets).map(getSubButton).filter(Boolean);
      buttonsToReset.forEach((button) => styleButton(button, { background: inactiveBg, icon: inactiveIcon, text: inactiveText, opacity: inactiveOpacity }));

      const styleActiveButton = (button, prefix, overrides = {}) => {
        if (!button) return;
        const bg = overrides.bg || color(`${prefix}_button_bg`, {
          off: "rgba(255,255,255,0.22)", low: "rgba(76,175,80,0.25)", medium: "rgba(255,193,7,0.25)", high: "rgba(244,67,54,0.25)"
        }[prefix] || "rgba(255,255,255,0.22)", { activeSpeed, styleKey: prefix });
        const icon = overrides.icon || color(`${prefix}_button_icon`, "", { activeSpeed, styleKey: prefix });
        const text = overrides.text || color(`${prefix}_button_text`, "", { activeSpeed, styleKey: prefix });
        const glowColor = overrides.glow || color(`${prefix}_glow`, {
          off: "rgba(255,255,255,0.55)", low: "rgba(76,175,80,0.85)", medium: "rgba(255,193,7,0.85)", high: "rgba(244,67,54,0.9)"
        }[prefix] || "", { activeSpeed, styleKey: prefix });
        const glowEnabled = overrides.glowEnabled !== undefined ? overrides.glowEnabled !== false : config[`${prefix}_glow_enabled`] !== false;
        const glowSize = Number(overrides.glowSize ?? config[`${prefix}_glow_size`] ?? 14);
        const glow = glowEnabled && glowColor && glowSize > 0 ? `0 0 ${glowSize}px ${glowColor}` : "none";
        if (glow !== "none") card.classList.add("fan-enable-glow");
        styleButton(button, { background: bg, icon: icon || inactiveIcon, text: text || inactiveText, opacity: 1, glow });
      };

      setScopedVar("--fan-card-background", color(`${activeStyleKey}_card`, "", { activeSpeed, styleKey: activeStyleKey }, "inherit"), "fan-custom-card-background");
      setScopedVar("--fan-icon-background", color(`${activeStyleKey}_icon_bg`, "", { activeSpeed, styleKey: activeStyleKey }, "inherit"), "fan-custom-icon-background");
      setScopedVar("--fan-icon-color", color(`${activeStyleKey}_icon`, "", { activeSpeed, styleKey: activeStyleKey }, "inherit"), "fan-custom-icon-color");

      const offButton = offUsesMainIcon ? null : getSubButton(Number(config.off_target ?? 1));
      const powerMode = config.power_button_mode || "off_only";
      const powerIcon = powerMode === "toggle"
        ? (fanOff ? (config.power_button_on_icon || "mdi:power-on") : (config.power_button_off_icon || config.off_button_icon || "mdi:power"))
        : (config.off_button_icon || config.power_button_off_icon || "mdi:power");
      setIconInButton(offButton, powerIcon);
      attachAction(offButton, () => {
        if (powerMode === "toggle" && fanOff) callControlService("turn_on");
        else callControlService("turn_off");
      }, config.off_action_enabled !== false);
      if (fanOff) styleActiveButton(offButton, "off");

      speeds.forEach((s) => {
        const btn = getSubButton(getSpeedButtonNumber(s));
        setIconInButton(btn, s.icon);
        attachAction(btn, () => callFanService("set_percentage", { percentage: s.value }), s.action_enabled !== false && percentageControlsEnabled);
        if (!presetMatch && activeSpeed && s === activeSpeed) {
          const key = getStyleKeyForSpeed(s);
          styleActiveButton(btn, key, {
            bg: String(s.button_bg_override || "").trim(),
            icon: String(s.button_icon_override || "").trim(),
            text: String(s.button_text_override || "").trim(),
            glow: String(s.glow_override || "").trim(),
          });
        }
      });

      const currentDirection = String(fan?.attributes?.[config.direction_attribute || "direction"] || "");
      const forwardValue = String(config.forward_value || "forward");
      const reverseValue = String(config.reverse_value || "reverse");
      const shouldHighlightDirection = () => {
        if (config.enable_direction !== true || config.highlight_direction_button === false) return false;
        const mode = config.direction_button_highlight_mode || "always";
        if (mode === "never") return false;
        if (mode === "reverse_only") return currentDirection === reverseValue;
        return true;
      };
      if (config.enable_direction === true) {
        const directionButton = getSubButton(Number(config.direction_sub_button_index ?? 5));
        const dirIcon = config.direction_button_icon || (currentDirection === reverseValue ? (config.reverse_icon || "mdi:keyboard-tab-reverse") : (config.forward_icon || "mdi:fast-forward")) || "mdi:swap-horizontal";
        setIconInButton(directionButton, dirIcon);
        attachAction(directionButton, () => {
          const next = currentDirection === forwardValue ? reverseValue : forwardValue;
          callFanService("set_direction", { direction: next });
        }, config.direction_action_enabled !== false && controlDomain === "fan");
        if (shouldHighlightDirection()) styleActiveButton(directionButton, fanOff ? "off" : activeStyleKey);
      }

      presetMappings.forEach((preset) => {
        const btn = getSubButton(Number(preset?.sub_button_index));
        if (!btn) return;
        const presetContext = getPresetContext(preset);
        if (preset.icon) setIconInButton(btn, preset.icon);
        if (preset.display_mode === "mirror_state") setTextInButton(btn, presetContext.currentValue || preset.label || preset.preset_value);
        attachAction(btn, () => callMappedAction(preset), preset.action_enabled !== false && (presetContext.actionType === "more_info" || !!preset.preset_value));
        if (isPresetActive(preset)) {
          const presetStyleKey = normalizeStyleKey(preset.style_preset) || (!fanOff ? activeStyleKey : "low") || "low";
          styleActiveButton(btn, presetStyleKey, {
            bg: objectColor(preset, "button_bg", ""),
            icon: objectColor(preset, "button_icon", ""),
            text: objectColor(preset, "button_text", ""),
            glow: objectColor(preset, "glow", ""),
            glowEnabled: preset.glow_enabled,
            glowSize: preset.glow_size,
          });
        }
      });

      // Main icon handling is intentionally conservative.
      // Bubble Card owns the configured card name/icon. This module must not
      // overwrite those values unless the user explicitly chooses an override mode.
      const mainBehavior = ({ active_speed: "active_speed_icon", on_off: "on_off_icon", card_icon: "keep_card_icon" }[config.main_icon_mode] || config.main_icon_behavior || "keep_card_icon");
      const mainOffIcon = config.main_off_icon || config.off_icon || "mdi:fan-off";
      const mainOnIcon = config.main_on_icon || "mdi:fan";
      const presetMainIcon = (presetMatch && config.preset_icon_overrides_main === true)
        ? (presetMatch.main_icon || presetMatch.icon || "")
        : "";

      if (!fanOff && presetMatch && presetMainIcon) {
        setMainIcon(presetMainIcon);
      } else if (mainBehavior === "active_speed_icon" && fanOff && config.enable_off_icon !== false) {
        setMainIcon(mainOffIcon);
        requestAnimationFrame(() => setMainIcon(mainOffIcon));
      } else if (mainBehavior === "active_speed_icon" && activeSpeed?.icon) {
        setMainIcon(activeSpeed.icon);
      } else if (mainBehavior === "on_off_icon") {
